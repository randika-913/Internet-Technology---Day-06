<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Customer Manager</h1>

    <input type="text" placeholder="Enter First Name" id="txtName"> 
    <input type="text" placeholder="Enter Address" id="txtAddress">
    <input type="text" placeholder="Enter Age" id="txtAge">
    <input type="text" placeholder="Enter Email" id="txtEmail">
    <input type="text" placeholder="Enter Salary" id="txtSalary">    
    
    
    <input type="button" value="Add Customer" onclick="btnAddCustomerOnAction()">

    <table border="1" id="tblCustomers">
        <tr>
            <td>Name</td>
            <td>Address</td>
            <td>Age</td>
            <td>Email</td>
            <td>Salary</td>
        </tr>
    </table>


    <input type="button" value="Load Table" onclick="loadTable()">

    
    
<script src="app.js"></script>    
</body>
</html>
